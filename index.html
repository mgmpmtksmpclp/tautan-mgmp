<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Tombol Developer</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Animasi sederhana untuk tombol saat dimuat */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-animate {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0; /* Mulai dari transparan sebelum animasi */
        }
    </style>
</head>
<body class="bg-gradient-to-b from-[#422473] to-[#5d2b86] min-h-screen text-white font-sans antialiased flex flex-col items-center py-12 px-4 relative">

    <!-- Tombol Toggle Edit Mode -->
    <button onclick="requestEditMode()" class="fixed bottom-6 right-6 bg-purple-600 hover:bg-purple-500 text-white w-14 h-14 rounded-full shadow-2xl z-40 transition-transform transform hover:scale-110 flex items-center justify-center border-2 border-white/10">
        <i id="toggle-icon" class="fas fa-cog text-xl"></i>
    </button>

    <!-- Kontainer Utama -->
    <div class="w-full max-w-md p-4 transition-all duration-300 relative">
        
        <!-- Badge Mode Edit -->
        <div id="edit-badge" class="hidden absolute -top-3 -right-3 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow z-10">
            Mode Edit Aktif
        </div>

        <!-- Header / Profil -->
        <div class="text-center mb-8 px-2">
            <!-- Elemen ini akan berubah menjadi input saat Mode Edit aktif -->
            <div id="page-title-container">
                <h1 id="page-title" class="text-2xl md:text-3xl font-extrabold tracking-wide text-white uppercase drop-shadow-md"></h1>
            </div>
            <div id="page-bio-container" class="mt-4">
                <p id="page-bio" class="text-[#e2d5f8] text-[15px] leading-relaxed drop-shadow-sm"></p>
            </div>
        </div>

        <!-- Tempat Tombol-Tombol Akan Dirender -->
        <div id="button-container" class="flex flex-col gap-4">
            <!-- Tombol akan di-generate oleh JavaScript di sini -->
        </div>

        <!-- Footer -->
        <div class="mt-10 text-center text-xs text-gray-400">
            <p>&copy; <span id="year"></span> | Dibuat oleh <span class="font-semibold text-purple-400">MGMP Matematika SMP Cilacap</span></p>
        </div>
    </div>

    <!-- Modal Form (Untuk Tambah/Edit Tombol) -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 px-4">
        <div class="bg-slate-800 border border-slate-600 rounded-xl w-full max-w-sm p-6 shadow-2xl">
            <h2 id="modal-title" class="text-xl font-bold mb-4 text-white">Edit Tombol</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Nama Tombol</label>
                    <input type="text" id="m-text" class="w-full bg-slate-700 text-white rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">URL / Tautan Tujuan</label>
                    <input type="text" id="m-url" class="w-full bg-slate-700 text-white rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Class Ikon (FontAwesome)</label>
                    <input type="text" id="m-icon" class="w-full bg-slate-700 text-white rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600">
                    <p class="text-[10px] text-gray-400 mt-1">Contoh: fas fa-globe, fab fa-instagram</p>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Warna Tombol (Tailwind)</label>
                    <input type="text" id="m-color" class="w-full bg-slate-700 text-white rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600">
                    <p class="text-[10px] text-gray-400 mt-1">Contoh: bg-blue-600 hover:bg-blue-500</p>
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-300 hover:text-white transition-colors">Batal</button>
                <button onclick="saveModalBtn()" class="px-4 py-2 text-sm font-medium bg-purple-600 hover:bg-purple-500 text-white rounded-lg shadow transition-colors">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Modal Form (Untuk Autentikasi PIN) -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 px-4">
        <div class="bg-slate-800 border border-slate-600 rounded-xl w-full max-w-xs p-6 shadow-2xl text-center">
            <i class="fas fa-lock text-4xl text-purple-500 mb-4"></i>
            <h2 class="text-xl font-bold mb-2 text-white">Masukkan PIN</h2>
            <p class="text-xs text-gray-400 mb-5">Hanya admin yang dapat masuk ke mode edit.</p>
            
            <input type="password" id="pin-input" class="w-full bg-slate-700 text-center text-white text-2xl rounded-lg p-3 mb-2 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600 tracking-[0.5em]" placeholder="****" onkeypress="if(event.key === 'Enter') verifyPin()">
            <div id="pin-error" class="hidden text-red-400 text-xs mb-4">PIN salah, silakan coba lagi.</div>
            <div id="pin-spacer" class="h-4 mb-4"></div>

            <div class="flex justify-between gap-3">
                <button onclick="closeAuthModal()" class="w-1/2 px-4 py-2 text-sm font-medium text-gray-300 hover:text-white transition-colors bg-slate-700 hover:bg-slate-600 rounded-lg">Batal</button>
                <button onclick="verifyPin()" class="w-1/2 px-4 py-2 text-sm font-medium bg-purple-600 hover:bg-purple-500 text-white rounded-lg shadow transition-colors">Masuk</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT LOGIKA APLIKASI -->
    <script>
        // PIN Rahasia untuk masuk ke Mode Edit (Ubah sesuai keinginan Anda)
        const ADMIN_PIN = "123456";

        // Data Default (jika belum ada data di penyimpanan browser)
        const defaultData = {
            title: "MGMP MATEMATIKA SMP CILACAP",
            bio: "Selamat datang di halaman kumpulan tautan MGMP Matematika SMP Kabupaten Cilacap",
            buttons: [
                { text: "Tautan LMS", url: "https://lomba-mtk.asesmen.web.id/my/", icon: "fas fa-globe", classColor: "bg-[#2563eb] hover:bg-blue-600" },
                { text: "Tautan Proktor", url: "https://lomba-mtk.asesmen.web.id/cbtadmin/", icon: "fab fa-github", classColor: "bg-[#242938] hover:bg-[#1a1e2a]" },
                { text: "Akun Proktor", url: "https://drive.google.com/file/d/1Dm2KU7fyTyT6k0SVYhUW0cZv6vM5Z5aG/view", icon: "fab fa-whatsapp", classColor: "bg-[#1ca34a] hover:bg-green-600" },
                { text: "Akun Peserta", url: "https://mgmpmtksmpclp.github.io/akun-peserta/", icon: "fas fa-link", classColor: "bg-[#2563eb] hover:bg-blue-600" }
            ]
        };

        // Ambil data dari Local Storage atau gunakan default (Key diubah agar mereset dengan desain baru)
        let appData = JSON.parse(localStorage.getItem('mgmpData_v2')) || defaultData;
        
        let isEditMode = false;
        let currentEditIndex = -1; // -1 berarti tambah tombol baru

        // Inisialisasi saat web dimuat
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').textContent = new Date().getFullYear();
            renderApp();
        });

        // Fungsi Simpan ke Local Storage
        function saveData() {
            localStorage.setItem('mgmpData_v2', JSON.stringify(appData));
        }

        // Fungsi Meminta Masuk Mode Edit
        function requestEditMode() {
            if (isEditMode) {
                // Jika sedang mode edit, langsung keluar saja
                isEditMode = false;
                renderApp();
            } else {
                // Jika ingin masuk mode edit, minta PIN
                document.getElementById('auth-modal').classList.remove('hidden');
                document.getElementById('pin-input').value = '';
                document.getElementById('pin-error').classList.add('hidden');
                document.getElementById('pin-spacer').classList.remove('hidden');
                setTimeout(() => document.getElementById('pin-input').focus(), 100);
            }
        }

        // Fungsi Menutup Modal PIN
        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
        }

        // Fungsi Verifikasi PIN
        function verifyPin() {
            const input = document.getElementById('pin-input').value;
            if (input === ADMIN_PIN) {
                closeAuthModal();
                isEditMode = true;
                renderApp();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                document.getElementById('pin-spacer').classList.add('hidden');
            }
        }

        // Fungsi Render Utama
        function renderApp() {
            const titleContainer = document.getElementById('page-title-container');
            const bioContainer = document.getElementById('page-bio-container');
            const btnContainer = document.getElementById('button-container');
            
            // Atur UI toggle button & badge
            document.getElementById('toggle-icon').className = isEditMode ? "fas fa-eye text-xl" : "fas fa-cog text-xl";
            document.getElementById('edit-badge').style.display = isEditMode ? "block" : "none";

            if (isEditMode) {
                // TAMPILAN MODE EDIT
                titleContainer.innerHTML = `<input type="text" id="edit-title" value="${appData.title}" class="w-full bg-slate-800/80 border border-purple-500 rounded p-2 text-center text-xl font-bold text-white focus:outline-none" oninput="updateProfileLive()">`;
                bioContainer.innerHTML = `<textarea id="edit-bio" class="w-full bg-slate-800/80 border border-purple-500 rounded p-2 text-center text-sm text-gray-300 h-24 resize-none focus:outline-none" oninput="updateProfileLive()">${appData.bio}</textarea>`;

                btnContainer.innerHTML = '';
                appData.buttons.forEach((btn, index) => {
                    btnContainer.innerHTML += `
                        <div class="flex items-center justify-between bg-slate-800/60 border border-slate-600 p-3 rounded-xl hover:border-purple-400 transition-colors">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <div class="w-8 h-8 rounded bg-slate-700 flex items-center justify-center"><i class="${btn.icon} text-gray-300"></i></div>
                                <span class="text-sm font-medium truncate">${btn.text}</span>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="openModal(${index})" class="bg-blue-500/20 text-blue-400 hover:bg-blue-500 hover:text-white p-2 rounded transition-colors"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteBtn(${index})" class="bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white p-2 rounded transition-colors"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });

                // Tombol Tambah Baru
                btnContainer.innerHTML += `
                    <button onclick="openModal(-1)" class="w-full py-4 mt-2 border-2 border-dashed border-gray-400/50 text-gray-300 rounded-xl hover:border-white hover:text-white transition-all hover:bg-white/10 font-medium">
                        <i class="fas fa-plus mr-2"></i> Tambah Tautan Baru
                    </button>
                `;

            } else {
                // TAMPILAN NORMAL (PENGUNJUNG)
                titleContainer.innerHTML = `<h1 id="page-title" class="text-2xl md:text-[26px] font-extrabold tracking-wide text-white uppercase drop-shadow-md leading-tight">${appData.title}</h1>`;
                bioContainer.innerHTML = `<p id="page-bio" class="text-[#e2d5f8] text-[15px] leading-relaxed px-2 drop-shadow-sm">${appData.bio}</p>`;

                btnContainer.innerHTML = '';
                appData.buttons.forEach((btn, index) => {
                    btnContainer.innerHTML += `
                        <a href="${btn.url}" target="_blank" rel="noopener noreferrer" 
                           class="btn-animate flex items-center p-[18px] rounded-xl text-white font-bold shadow-md transition-transform duration-200 transform hover:scale-105 active:scale-95 ${btn.classColor}"
                           style="animation-delay: ${index * 0.1}s">
                            <div class="w-10 flex justify-center text-[22px]">
                                <i class="${btn.icon}"></i>
                            </div>
                            <div class="flex-grow text-center pr-10 text-[16px]">
                                ${btn.text}
                            </div>
                        </a>
                    `;
                });
            }
        }

        // Fungsi Update Profil Secara Langsung
        function updateProfileLive() {
            appData.title = document.getElementById('edit-title').value;
            appData.bio = document.getElementById('edit-bio').value;
            saveData();
        }

        // Fungsi Hapus Tombol
        function deleteBtn(index) {
            if(confirm(`Yakin ingin menghapus tautan "${appData.buttons[index].text}"?`)) {
                appData.buttons.splice(index, 1);
                saveData();
                renderApp();
            }
        }

        // Fungsi Buka Modal (Tambah/Edit)
        function openModal(index) {
            currentEditIndex = index;
            const modal = document.getElementById('edit-modal');
            
            if (index > -1) {
                // Mode Edit Data Lama
                const btn = appData.buttons[index];
                document.getElementById('m-text').value = btn.text;
                document.getElementById('m-url').value = btn.url;
                document.getElementById('m-icon').value = btn.icon;
                document.getElementById('m-color').value = btn.classColor;
                document.getElementById('modal-title').textContent = "Edit Tautan";
            } else {
                // Mode Tambah Data Baru
                document.getElementById('m-text').value = "";
                document.getElementById('m-url').value = "https://";
                document.getElementById('m-icon').value = "fas fa-link";
                document.getElementById('m-color').value = "bg-blue-600 hover:bg-blue-500";
                document.getElementById('modal-title').textContent = "Tambah Tautan Baru";
            }
            
            modal.classList.remove('hidden');
        }

        // Fungsi Tutup Modal
        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        // Fungsi Simpan Data Modal
        function saveModalBtn() {
            const newBtn = {
                text: document.getElementById('m-text').value || "Tombol Tanpa Nama",
                url: document.getElementById('m-url').value || "#",
                icon: document.getElementById('m-icon').value || "fas fa-link",
                classColor: document.getElementById('m-color').value || "bg-gray-600 hover:bg-gray-500"
            };

            if (currentEditIndex > -1) {
                appData.buttons[currentEditIndex] = newBtn; // Update
            } else {
                appData.buttons.push(newBtn); // Tambah Baru
            }

            saveData();
            closeModal();
            renderApp();
        }
    </script>
</body>
</html>
